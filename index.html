<!doctype html>
<html lang="en" class="h-full">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AI License Plate Reader</title>

    <!-- Tailwind CDN -->
    <script src="https://cdn.tailwindcss.com"></script>

    <!-- Inter Font -->
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap"
      rel="stylesheet"
    />

    <script src="src/main.js" type="module"></script>

    <style>
      body {
        font-family: "Inter", sans-serif;
      }
    </style>
  </head>

  <body class="h-full bg-slate-950 text-slate-100 antialiased">
    <!-- Background Glow -->
    <div class="absolute inset-0 -z-10 overflow-hidden">
      <div
        class="absolute top-[-20%] left-[10%] w-[600px] h-[600px] bg-indigo-600/30 rounded-full blur-[120px]"
      ></div>
      <div
        class="absolute bottom-[-20%] right-[10%] w-[600px] h-[600px] bg-cyan-500/20 rounded-full blur-[120px]"
      ></div>
    </div>

    <div class="min-h-full px-6 py-10 lg:px-16">
      <!-- Header -->
      <header class="max-w-7xl mx-auto mb-12">
        <div
          class="flex flex-col md:flex-row md:items-center md:justify-between gap-6"
        >
          <div>
            <h1
              class="text-4xl md:text-5xl font-bold tracking-tight bg-gradient-to-r from-indigo-400 to-cyan-400 bg-clip-text text-transparent"
            >
              AI License Plate Reader
            </h1>
            <p class="mt-3 text-slate-400 text-lg">
              Real-time detection powered by YOLOv8 & PaddleOCR
            </p>
          </div>

          <div class="flex items-center gap-3">
            <span
              class="inline-flex items-center gap-2 px-4 py-2 rounded-full bg-emerald-500/10 text-emerald-400 text-sm font-medium border border-emerald-500/20"
            >
              <span
                class="w-2 h-2 rounded-full bg-emerald-400 animate-pulse"
              ></span>
              Live Detection
            </span>
          </div>
        </div>
      </header>

      <!-- Main Dashboard Grid -->
      <main class="max-w-7xl mx-auto grid gap-8">
        <!-- Camera Section -->
        <section class="lg:col-span-2">
          <div
            class="relative rounded-2xl bg-white/5 backdrop-blur-xl border border-white/10 shadow-2xl overflow-hidden"
          >
            <!-- Camera Header -->
            <div
              class="px-6 py-4 border-b border-white/10 flex items-center justify-between"
            >
              <h2 class="text-lg font-semibold text-slate-200">
                Live Camera Feed
              </h2>
              <span class="text-xs text-slate-400">320x320</span>
            </div>

            <!-- Video Container -->
            <div class="relative aspect-square max-h-[600px] mx-auto">
              <video
                id="video"
                class="w-full h-full object-cover"
                autoplay
                muted
                playsinline
              ></video>

              <canvas
                id="canvas"
                class="absolute top-0 left-0 w-full h-full pointer-events-none"
                width="320"
                height="320"
              ></canvas>
            </div>
          </div>
        </section>
      </main>

      <!-- Footer -->
      <footer class="mt-16 text-center text-slate-500 text-sm">
        <p>Built for education • YOLOv8 + PaddleOCR</p>
      </footer>
    </div>
  </body>
</html>
